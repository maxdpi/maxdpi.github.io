<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logan Sturrock</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray:  #888888;
      --light: #cccccc;
      --bg:    #ffffff;
      --font:  'GT Pressura Mono', 'Courier New', monospace;
      --col-right: 200px;
      /* Frame margin around each image in the scroll gallery — tweak freely. */
      --frame-padding: 2.5rem;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
    }

    /* ── Desktop layout ───────────────────────────────── */
    .desktop {
      display: grid;
      grid-template-columns: 1fr var(--col-right);
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .main-area {
      grid-column: 1;
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--light);
    }

    .name-block {
      grid-column: 2;
      grid-row: 1;
      border-bottom: 1px solid var(--light);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .name-block h1 {
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    .name-block h1 a,
    .mobile-name > a {
      color: inherit;
      text-decoration: none;
    }

    .name-block h1 a:hover,
    .mobile-name > a:hover {
      color: var(--gray);
    }

    .name-block p {
      color: var(--gray);
      margin-top: 0.25rem;
      font-size: 0.8rem;
    }

    .menu-block {
      grid-column: 2;
      grid-row: 2;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0.75rem;
    }

    /* ── Menu ─────────────────────────────────────────── */
    .menu-toggle {
      background: none;
      border: none;
      font-family: var(--font);
      color: var(--gray);
      cursor: pointer;
      padding: 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
    }

    .menu-toggle:hover { color: var(--black); }

    .menu-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .menu-group.open .arrow { transform: rotate(90deg); }

    .menu-items {
      display: none;
      padding-top: 0.4rem;
      padding-left: 0.5rem;
    }

    .menu-group.open .menu-items { display: block; }

    .menu-items button {
      display: block;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--black);
      cursor: pointer;
      padding: 0.2rem 0;
      text-align: left;
      width: 100%;
    }

    .menu-items button:hover { color: var(--gray); }
    .menu-items button.active { text-decoration: underline; }

    /* ── Main area panels ─────────────────────────────── */

    /* All panels sit absolute, full area, hidden by default */
    .display-box,
    .project-view,
    .info-panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .display-box.active,
    .project-view.active,
    .info-panel.active { display: block; }

    /* Featured display */
    .display-box {
      background: #f4f4f4;
    }

    .display-box img,
    .display-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .display-box .placeholder-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--light);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Project view — vertical scroll gallery, seamless infinite loop */
    .project-view {
      background: #f4f4f4;
    }

    /* The scrolling column. Images stack as full-height, snap-aligned slides. */
    .scroll-track {
      position: absolute;
      inset: 0;
      overflow-x: hidden;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;            /* Firefox */
    }
    .scroll-track::-webkit-scrollbar { display: none; }  /* WebKit */

    /* One image per screen, framed against the background by --frame-padding. */
    .scroll-track .slide {
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--frame-padding);
    }

    .scroll-track .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;            /* show true dimensions, no cropping */
      display: block;
    }

    .project-counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 11px;
      color: var(--gray);
      pointer-events: none;
      z-index: 2;
    }

    /* Info panels */
    .info-panel {
      padding: 3rem;
      display: none;
      flex-direction: column;
      justify-content: center;
    }

    .info-panel.active { display: flex; }

    .info-panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--light);
      padding-bottom: 0.5rem;
    }

    .info-panel p {
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .info-panel a {
      color: var(--black);
      border-bottom: 1px solid var(--light);
      text-decoration: none;
    }

    .info-panel a:hover { border-color: var(--black); }

    /* ── Mobile ───────────────────────────────────────── */
    .mobile { display: none; }

    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      .desktop { display: none; }

      .mobile {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .mobile-content {
        position: relative;
        background: #f4f4f4;
        width: 100%;
        height: 78vh;
        overflow: hidden;
      }

      .mobile-content img,
      .mobile-content video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .mobile-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--light);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .mobile-info-panel {
        display: none;
        padding: 2rem 1.5rem;
      }

      .mobile-info-panel.active { display: block; }

      .mobile-info-panel h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--gray);
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--light);
        padding-bottom: 0.5rem;
      }

      .mobile-info-panel p { line-height: 1.8; margin-bottom: 1rem; }
      .mobile-info-panel a { color: var(--black); }

      .mobile-nav {
        padding: 1.5rem;
        border-top: 1px solid var(--light);
      }

      .mobile-name {
        font-weight: bold;
        margin-bottom: 1.5rem;
      }

      .mobile-name span {
        display: block;
        color: var(--gray);
        font-weight: normal;
        font-size: 0.9em;
        margin-top: 0.15rem;
      }

      .mobile-menu-group { margin-bottom: 0.75rem; }

      .mobile-menu-toggle {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 11px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .mobile-menu-toggle .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      .mobile-menu-group.open .arrow { transform: rotate(90deg); }

      .mobile-menu-items {
        display: none;
        padding: 0.4rem 0 0 0.5rem;
      }

      .mobile-menu-group.open .mobile-menu-items { display: block; }

      .mobile-menu-items button {
        display: block;
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--black);
        cursor: pointer;
        padding: 0.25rem 0;
        text-align: left;
        width: 100%;
      }

      .mobile-back-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg);
        border-top: 1px solid var(--light);
        padding: 0.75rem 1.5rem;
        z-index: 50;
      }

      .mobile-back-bar.visible { display: flex; }

      .mobile-back-btn {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--gray);
        cursor: pointer;
        padding: 0;
      }
    }

  </style>
</head>

  <script>

    // ── Project state ──────────────────────────────────
    let activeProject = null;
    let activeProjectBtn = null;
    let activePanelBtn = null;
    let mobileActiveProject = null;
    let mobileIsFeatured = true;

    // ── Vertical scroll gallery with seamless infinite loop ──
    // Lays out [clone(last), ...images, clone(first)] as full-height,
    // snap-aligned slides. When the scroll settles on a clone it jumps to the
    // matching real slide, so the gallery loops endlessly in both directions.
    function buildScroller(track, counter, images) {
      if (!track) return;
      track.onscroll = null;
      track.innerHTML = '';
      if (!images || !images.length) { if (counter) counter.textContent = ''; return; }
      const N = images.length;

      function slide(src) {
        const s = document.createElement('div');
        s.className = 'slide';
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = 'lazy';
        s.appendChild(img);
        return s;
      }

      track.appendChild(slide(images[N - 1])); // buffer: clone of last
      images.forEach((src) => track.appendChild(slide(src)));
      track.appendChild(slide(images[0]));     // buffer: clone of first

      function setCounter(raw) {
        if (!counter) return;
        const real = ((raw - 1) % N + N) % N;  // slide index → real image index
        counter.textContent = (real + 1) + ' / ' + N;
      }

      // Start on the first real slide (index 1), once the track has a height.
      (function init() {
        const h = track.clientHeight;
        if (!h) { requestAnimationFrame(init); return; }
        track.scrollTop = h;
        setCounter(1);
      })();

      let ticking = false;
      track.onscroll = function () {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () {
          const h = track.clientHeight || 1;
          if (track.scrollTop <= 0) {
            track.scrollTop = h * N;             // scrolled above first real → real last
          } else if (track.scrollTop >= h * (N + 1)) {
            track.scrollTop = h;                 // scrolled below last real → real first
          }
          setCounter(Math.round(track.scrollTop / h));
          ticking = false;
        });
      };
    }

    // A single, non-looping slide (used for the featured / home image).
    function buildSingle(track, src) {
      if (!track) return;
      track.onscroll = null;
      track.innerHTML = '';
      const s = document.createElement('div');
      s.className = 'slide';
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      img.onerror = function () { this.style.display = 'none'; };
      s.appendChild(img);
      track.appendChild(s);
    }

    // ── Keyboard: up / down arrows scroll the active gallery ──
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
      const track = activeProject
        ? document.getElementById(activeProject + '-track')
        : (!mobileIsFeatured ? document.getElementById('mobile-track') : null);
      if (!track) return;
      e.preventDefault();
      track.scrollBy({ top: (e.key === 'ArrowDown' ? 1 : -1) * track.clientHeight, behavior: 'smooth' });
    });

    // ── Desktop: show project ──────────────────────────
    function showProject(id, btn) {
      hideAll();
      buildScroller(
        document.getElementById(id + '-track'),
        document.getElementById(id + '-counter'),
        PROJECTS[id] && PROJECTS[id].images
      );
      document.getElementById(id).classList.add('active');
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      activeProjectBtn = btn;
      btn.classList.add('active');
      activeProject = id;
    }

    function showPanel(id, btn) {
      hideAll();
      document.getElementById(id).classList.add('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activePanelBtn = btn;
      btn.classList.add('active');
    }

    function hideAll() {
      document.querySelectorAll('.project-view, .info-panel, .display-box').forEach(el => {
        el.classList.remove('active');
      });
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activeProject = null;
    }

    function goHome() {
      hideAll();
      document.getElementById('display-default').classList.add('active');
      mGoBack();
    }

    // ── Desktop: menu toggles ──────────────────────────
    function toggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    // ── Mobile: show the featured (home) image ────────
    function mShowFeatured() {
      buildSingle(document.getElementById('mobile-track'),
                  window.SITE_FEATURED || 'images/featured.jpg');
      const c = document.getElementById('mobile-counter');
      if (c) c.textContent = '';
    }

    function mShowProject(id, btn) {
      mHideInfoPanels();
      buildScroller(
        document.getElementById('mobile-track'),
        document.getElementById('mobile-counter'),
        PROJECTS[id] && PROJECTS[id].images
      );
      mobileActiveProject = id;
      mobileIsFeatured = false;
      showMobileBack();
    }

    function mShowPanel(id, btn) {
      mHideInfoPanels();
      mShowFeatured();
      document.getElementById(id).classList.add('active');
      mobileIsFeatured = true;
      mobileActiveProject = null;
      showMobileBack();
    }

    function mHideInfoPanels() {
      document.querySelectorAll('.mobile-info-panel').forEach(el => el.classList.remove('active'));
    }

    function mGoBack() {
      mHideInfoPanels();
      mShowFeatured();
      mobileIsFeatured = true;
      mobileActiveProject = null;
      hideMobileBack();
    }

    function mToggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function showMobileBack() {
      document.getElementById('mobile-back-bar').classList.add('visible');
    }

    function hideMobileBack() {
      document.getElementById('mobile-back-bar').classList.remove('visible');
    }

    // Navigation is now native vertical scrolling (wheel / trackpad / touch),
    // so no custom swipe handling is needed — touch drag scrolls the gallery.

    // ── Mobile: show the featured image on load ───────
    mShowFeatured();

  </script>


  <!-- ════════════════════════════════════════════════
       SANITY — fetch & render projects from the CMS.
       Progressive enhancement: if the CMS responds, it
       replaces the static project list above. If the
       request fails, the hardcoded projects remain.
       Public, published content only — no token.
  ════════════════════════════════════════════════ -->
  <script>
    (function () {
      const SANITY = {
        projectId: 'aiajifvh',
        dataset: 'production',
        apiVersion: 'v2024-01-01',
      };

      // GROQ: published projects, in menu order.
      const QUERY =
        '*[_type=="project" && !(_id in path("drafts.**"))]|order(order asc,_createdAt asc)' +
        '{_id,title,"slug":slug.current,"mainRef":mainImage.asset._ref,' +
        '"gallery":gallery[]{"ref":asset._ref,alt}}';

      const apiUrl =
        'https://' + SANITY.projectId + '.apicdn.sanity.io/' + SANITY.apiVersion +
        '/data/query/' + SANITY.dataset + '?query=' + encodeURIComponent(QUERY);

      // Build a CDN image URL from a Sanity asset ref:
      //   image-<assetId>-<w>x<h>-<ext>  ->  .../<assetId>-<w>x<h>.<ext>
      function urlFor(ref) {
        if (!ref) return '';
        const parts = ref.split('-'); // ['image', id, '1200x800', 'jpg']
        if (parts.length < 4) return '';
        const id = parts[1], dims = parts[2], ext = parts[3];
        return 'https://cdn.sanity.io/images/' + SANITY.projectId + '/' + SANITY.dataset +
          '/' + id + '-' + dims + '.' + ext + '?auto=format&fit=max&w=1600&q=80';
      }

      function render(projects) {
        if (!projects || !projects.length) return; // keep static fallback

        // Remove the static (hardcoded) project entries now that the CMS answered.
        document.querySelectorAll('.main-area > .project-view').forEach((el) => el.remove());
        const deskItems = document.querySelector('#group-projects .menu-items');
        const mobItems = document.querySelector('#m-group-projects .mobile-menu-items');
        if (deskItems) deskItems.innerHTML = '';
        if (mobItems) mobItems.innerHTML = '';
        const mainArea = document.querySelector('.main-area');

        projects.forEach((p) => {
          const id = 'project-' + (p.slug || p._id);
          const gallery = (p.gallery || []).map((g) => urlFor(g.ref)).filter(Boolean);
          const images = gallery.length ? gallery : [urlFor(p.mainRef)].filter(Boolean);
          if (!images.length) return;

          // Register in the shared PROJECTS map used by the existing functions.
          PROJECTS[id] = { images: images };

          // Desktop: project-view panel (vertical scroll gallery, built on open).
          const view = document.createElement('div');
          view.className = 'project-view';
          view.id = id;
          const track = document.createElement('div');
          track.className = 'scroll-track';
          track.id = id + '-track';
          const counter = document.createElement('div');
          counter.className = 'project-counter';
          counter.id = id + '-counter';
          view.appendChild(track);
          view.appendChild(counter);
          if (mainArea) mainArea.appendChild(view);

          // Desktop: menu button.
          if (deskItems) {
            const btn = document.createElement('button');
            btn.textContent = p.title || id;
            btn.addEventListener('click', () => showProject(id, btn));
            deskItems.appendChild(btn);
          }

          // Mobile: menu button.
          if (mobItems) {
            const mbtn = document.createElement('button');
            mbtn.textContent = p.title || id;
            mbtn.addEventListener('click', () => mShowProject(id, mbtn));
            mobItems.appendChild(mbtn);
          }
        });
      }

      function queryUrl(groq) {
        return 'https://' + SANITY.projectId + '.apicdn.sanity.io/' + SANITY.apiVersion +
          '/data/query/' + SANITY.dataset + '?query=' + encodeURIComponent(groq);
      }

      fetch(apiUrl)
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status))))
        .then((data) => render(data && data.result))
        .catch((err) => console.warn('[sanity] project fetch failed, using static fallback:', err));

      // ── Site Settings (featured image, name, tagline, about, contact) ──
      // Each field is applied only when present; otherwise the static
      // placeholder in the markup remains untouched.
      const SETTINGS_QUERY =
        '*[_id=="siteSettings"][0]{name,tagline,email,' +
        '"featuredRef":featuredImage.asset._ref,about}';

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => (
          {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]
        ));
      }

      // Minimal Portable Text → HTML (plain paragraphs).
      function ptToHtml(blocks) {
        return (blocks || [])
          .filter((b) => b && b._type === 'block')
          .map((b) => '<p>' + escapeHtml((b.children || []).map((c) => c.text || '').join('')) + '</p>')
          .join('');
      }

      // Replace a panel's body (the <p> after its <h2>) with new HTML.
      function setPanelBody(id, html) {
        const el = document.getElementById(id);
        if (!el || !html) return;
        el.querySelectorAll('p').forEach((p) => p.remove());
        el.insertAdjacentHTML('beforeend', html);
      }

      function renderSettings(s) {
        if (!s) return;

        // Featured (home) image — desktop + mobile, and the mobile revert target.
        const featSrc = urlFor(s.featuredRef);
        if (featSrc) {
          window.SITE_FEATURED = featSrc;
          const deskImg = document.querySelector('#display-default img');
          if (deskImg) { deskImg.src = featSrc; deskImg.style.display = ''; }
          if (typeof mobileIsFeatured === 'undefined' || mobileIsFeatured) mShowFeatured();
        }

        // Name.
        if (s.name) {
          const dn = document.querySelector('.name-block h1 a');
          if (dn) dn.textContent = s.name;
          const mn = document.querySelector('.mobile-name a');
          if (mn) mn.textContent = s.name;
        }

        // Tagline.
        if (s.tagline) {
          document.querySelectorAll('.name-block p').forEach((p) => (p.textContent = s.tagline));
          const mspan = document.querySelector('.mobile-name span');
          if (mspan) mspan.textContent = s.tagline;
        }

        // About (portable text).
        const aboutHtml = ptToHtml(s.about);
        if (aboutHtml) {
          setPanelBody('panel-about', aboutHtml);
          setPanelBody('m-panel-about', aboutHtml);
        }

        // Contact email.
        if (s.email) {
          const link = '<p><a href="mailto:' + encodeURIComponent(s.email).replace(/%40/g, '@') +
            '">' + escapeHtml(s.email) + '</a></p>';
          setPanelBody('panel-contact', link);
          setPanelBody('m-panel-contact', link);
        }
      }

      fetch(queryUrl(SETTINGS_QUERY))
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status))))
        .then((data) => renderSettings(data && data.result))
        .catch((err) => console.warn('[sanity] settings fetch failed, using static fallback:', err));
    })();
  </script>

</body>
</html>
