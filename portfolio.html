<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logan Sturrock</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray:  #888888;
      --light: #cccccc;
      --bg:    #ffffff;
      --font:  'GT Pressura Mono', 'Courier New', monospace;
      --col-right: 200px;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
    }

    /* ── Desktop layout ───────────────────────────────── */
    .desktop {
      display: grid;
      grid-template-columns: 1fr var(--col-right);
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .main-area {
      grid-column: 1;
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--light);
    }

    .name-block {
      grid-column: 2;
      grid-row: 1;
      border-bottom: 1px solid var(--light);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .name-block h1 {
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    .name-block h1 a,
    .mobile-name > a {
      color: inherit;
      text-decoration: none;
    }

    .name-block h1 a:hover,
    .mobile-name > a:hover {
      color: var(--gray);
    }

    .name-block p {
      color: var(--gray);
      margin-top: 0.25rem;
      font-size: 0.8rem;
    }

    .menu-block {
      grid-column: 2;
      grid-row: 2;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0.75rem;
    }

    /* ── Menu ─────────────────────────────────────────── */
    .menu-toggle {
      background: none;
      border: none;
      font-family: var(--font);
      color: var(--gray);
      cursor: pointer;
      padding: 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
    }

    .menu-toggle:hover { color: var(--black); }

    .menu-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .menu-group.open .arrow { transform: rotate(90deg); }

    .menu-items {
      display: none;
      padding-top: 0.4rem;
      padding-left: 0.5rem;
    }

    .menu-group.open .menu-items { display: block; }

    .menu-items button {
      display: block;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--black);
      cursor: pointer;
      padding: 0.2rem 0;
      text-align: left;
      width: 100%;
    }

    .menu-items button:hover { color: var(--gray); }
    .menu-items button.active { text-decoration: underline; }

    /* ── Main area panels ─────────────────────────────── */

    /* All panels sit absolute, full area, hidden by default */
    .display-box,
    .project-view,
    .info-panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .display-box.active,
    .project-view.active,
    .info-panel.active { display: block; }

    /* Featured display */
    .display-box {
      background: #f4f4f4;
    }

    .display-box img,
    .display-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .display-box .placeholder-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--light);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Project view — single full-bleed image, click to advance */
    .project-view {
      background: #f4f4f4;
      cursor: pointer;
    }

    .project-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .project-counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
    }

    /* Info panels */
    .info-panel {
      padding: 3rem;
      display: none;
      flex-direction: column;
      justify-content: center;
    }

    .info-panel.active { display: flex; }

    .info-panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--light);
      padding-bottom: 0.5rem;
    }

    .info-panel p {
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .info-panel a {
      color: var(--black);
      border-bottom: 1px solid var(--light);
      text-decoration: none;
    }

    .info-panel a:hover { border-color: var(--black); }

    /* ── Mobile ───────────────────────────────────────── */
    .mobile { display: none; }

    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      .desktop { display: none; }

      .mobile {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .mobile-content {
        position: relative;
        background: #f4f4f4;
        width: 100%;
        aspect-ratio: 1/1;
        overflow: hidden;
        cursor: pointer;
      }

      .mobile-content img,
      .mobile-content video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .mobile-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--light);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .mobile-info-panel {
        display: none;
        padding: 2rem 1.5rem;
      }

      .mobile-info-panel.active { display: block; }

      .mobile-info-panel h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--gray);
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--light);
        padding-bottom: 0.5rem;
      }

      .mobile-info-panel p { line-height: 1.8; margin-bottom: 1rem; }
      .mobile-info-panel a { color: var(--black); }

      .mobile-nav {
        padding: 1.5rem;
        border-top: 1px solid var(--light);
      }

      .mobile-name {
        font-weight: bold;
        margin-bottom: 1.5rem;
      }

      .mobile-name span {
        display: block;
        color: var(--gray);
        font-weight: normal;
        font-size: 0.9em;
        margin-top: 0.15rem;
      }

      .mobile-menu-group { margin-bottom: 0.75rem; }

      .mobile-menu-toggle {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 11px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .mobile-menu-toggle .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      .mobile-menu-group.open .arrow { transform: rotate(90deg); }

      .mobile-menu-items {
        display: none;
        padding: 0.4rem 0 0 0.5rem;
      }

      .mobile-menu-group.open .mobile-menu-items { display: block; }

      .mobile-menu-items button {
        display: block;
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--black);
        cursor: pointer;
        padding: 0.25rem 0;
        text-align: left;
        width: 100%;
      }

      .mobile-back-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg);
        border-top: 1px solid var(--light);
        padding: 0.75rem 1.5rem;
        z-index: 50;
      }

      .mobile-back-bar.visible { display: flex; }

      .mobile-back-btn {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--gray);
        cursor: pointer;
        padding: 0;
      }
    }

  </style>
</head>

  <script>

    // ── Project state ──────────────────────────────────
    const projectIdx = {};
    let activeProject = null;
    let activeProjectBtn = null;
    let activePanelBtn = null;
    let mobileActiveProject = null;
    let mobileIsFeatured = true;

    // ── Desktop: step through images (dir = +1 / -1) ──
    function stepProject(id, dir) {
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (!images || images.length === 0) return;
      projectIdx[id] = ((projectIdx[id] || 0) + dir + images.length) % images.length;
      document.getElementById(id + '-img').src = images[projectIdx[id]];
      document.getElementById(id + '-counter').textContent =
        (projectIdx[id] + 1) + ' / ' + images.length;
    }

    // ── Desktop: cycle images on click ────────────────
    function cycleProject(id) {
      if (window.__swipeJustHappened) return; // ignore the click a swipe leaves behind
      stepProject(id, 1);
    }

    // ── Keyboard: left / right arrows navigate active project ──
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      // Desktop active project, or mobile active project
      const id = activeProject || (!mobileIsFeatured && mobileActiveProject);
      if (!id) return;
      e.preventDefault();
      const dir = e.key === 'ArrowRight' ? 1 : -1;
      if (activeProject) {
        stepProject(id, dir);
      } else {
        mStepProject(id, dir);
      }
    });

    // ── Desktop: show project ──────────────────────────
    function showProject(id, btn) {
      hideAll();
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (images && images.length > 0) {
        projectIdx[id] = 0;
        document.getElementById(id + '-img').src = images[0];
        document.getElementById(id + '-counter').textContent =
          '1 / ' + images.length;
      }
      document.getElementById(id).classList.add('active');
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      activeProjectBtn = btn;
      btn.classList.add('active');
      activeProject = id;
    }

    function showPanel(id, btn) {
      hideAll();
      document.getElementById(id).classList.add('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activePanelBtn = btn;
      btn.classList.add('active');
    }

    function hideAll() {
      document.querySelectorAll('.project-view, .info-panel, .display-box').forEach(el => {
        el.classList.remove('active');
      });
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activeProject = null;
    }

    function goHome() {
      hideAll();
      document.getElementById('display-default').classList.add('active');
      mGoBack();
    }

    // ── Desktop: menu toggles ──────────────────────────
    function toggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    // ── Mobile: step through images (dir = +1 / -1) ───
    function mStepProject(id, dir) {
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (!images || images.length === 0) return;
      projectIdx[id] = ((projectIdx[id] || 0) + dir + images.length) % images.length;
      document.getElementById('mobile-img').src = images[projectIdx[id]];
    }

    // ── Mobile: cycle images on tap ───────────────────
    function mobileCycle() {
      if (window.__swipeJustHappened) return; // ignore the click a swipe leaves behind
      if (!mobileActiveProject || mobileIsFeatured) return;
      mStepProject(mobileActiveProject, 1);
    }

    function mShowProject(id, btn) {
      mHideInfoPanels();
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (images && images.length > 0) {
        projectIdx[id] = 0;
        document.getElementById('mobile-img').src = images[0];
        document.getElementById('mobile-img').style.display = 'block';
      }
      mobileActiveProject = id;
      mobileIsFeatured = false;
      showMobileBack();
    }

    function mShowPanel(id, btn) {
      mHideInfoPanels();
      document.getElementById('mobile-img').src = window.SITE_FEATURED || 'images/featured.jpg';
      document.getElementById(id).classList.add('active');
      mobileIsFeatured = true;
      mobileActiveProject = null;
      showMobileBack();
    }

    function mHideInfoPanels() {
      document.querySelectorAll('.mobile-info-panel').forEach(el => el.classList.remove('active'));
    }

    function mGoBack() {
      mHideInfoPanels();
      document.getElementById('mobile-img').src = window.SITE_FEATURED || 'images/featured.jpg';
      document.getElementById('mobile-img').style.display = 'block';
      mobileIsFeatured = true;
      mobileActiveProject = null;
      hideMobileBack();
    }

    function mToggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function showMobileBack() {
      document.getElementById('mobile-back-bar').classList.add('visible');
    }

    function hideMobileBack() {
      document.getElementById('mobile-back-bar').classList.remove('visible');
    }

    // ── Swipe: drag left/right to navigate the active project ──
    // Works for the desktop project-view and the mobile view, including
    // the project panels created dynamically from Sanity, via delegation.
    (function () {
      const THRESHOLD = 40; // min horizontal travel (px) to count as a swipe
      let startX = 0, startY = 0, tracking = false;

      // The id of whatever project is currently on screen, or null.
      function currentProject() {
        return activeProject || (!mobileIsFeatured && mobileActiveProject) || null;
      }

      function step(id, dir) {
        if (activeProject === id) stepProject(id, dir);
        else mStepProject(id, dir);
      }

      document.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1 || !currentProject()) { tracking = false; return; }
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
      }, { passive: true });

      document.addEventListener('touchmove', function (e) {
        if (!tracking) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        // Once the gesture is clearly horizontal, stop the page from scrolling.
        if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) && e.cancelable) {
          e.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('touchend', function (e) {
        if (!tracking) return;
        tracking = false;
        const id = currentProject();
        if (!id) return;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
          step(id, dx < 0 ? 1 : -1); // swipe left → next, swipe right → previous
          // Suppress the synthetic click the browser fires after the swipe.
          window.__swipeJustHappened = true;
          setTimeout(function () { window.__swipeJustHappened = false; }, 350);
        }
      }, { passive: true });
    })();

  </script>


  <!-- ════════════════════════════════════════════════
       SANITY — fetch & render projects from the CMS.
       Progressive enhancement: if the CMS responds, it
       replaces the static project list above. If the
       request fails, the hardcoded projects remain.
       Public, published content only — no token.
  ════════════════════════════════════════════════ -->
  <script>
    (function () {
      const SANITY = {
        projectId: 'aiajifvh',
        dataset: 'production',
        apiVersion: 'v2024-01-01',
      };

      // GROQ: published projects, in menu order.
      const QUERY =
        '*[_type=="project" && !(_id in path("drafts.**"))]|order(order asc,_createdAt asc)' +
        '{_id,title,"slug":slug.current,"mainRef":mainImage.asset._ref,' +
        '"gallery":gallery[]{"ref":asset._ref,alt}}';

      const apiUrl =
        'https://' + SANITY.projectId + '.apicdn.sanity.io/' + SANITY.apiVersion +
        '/data/query/' + SANITY.dataset + '?query=' + encodeURIComponent(QUERY);

      // Build a CDN image URL from a Sanity asset ref:
      //   image-<assetId>-<w>x<h>-<ext>  ->  .../<assetId>-<w>x<h>.<ext>
      function urlFor(ref) {
        if (!ref) return '';
        const parts = ref.split('-'); // ['image', id, '1200x800', 'jpg']
        if (parts.length < 4) return '';
        const id = parts[1], dims = parts[2], ext = parts[3];
        return 'https://cdn.sanity.io/images/' + SANITY.projectId + '/' + SANITY.dataset +
          '/' + id + '-' + dims + '.' + ext + '?auto=format&fit=max&w=1600&q=80';
      }

      function render(projects) {
        if (!projects || !projects.length) return; // keep static fallback

        // Remove the static (hardcoded) project entries now that the CMS answered.
        document.querySelectorAll('.main-area > .project-view').forEach((el) => el.remove());
        const deskItems = document.querySelector('#group-projects .menu-items');
        const mobItems = document.querySelector('#m-group-projects .mobile-menu-items');
        if (deskItems) deskItems.innerHTML = '';
        if (mobItems) mobItems.innerHTML = '';
        const mainArea = document.querySelector('.main-area');

        projects.forEach((p) => {
          const id = 'project-' + (p.slug || p._id);
          const gallery = (p.gallery || []).map((g) => urlFor(g.ref)).filter(Boolean);
          const images = gallery.length ? gallery : [urlFor(p.mainRef)].filter(Boolean);
          if (!images.length) return;

          // Register in the shared PROJECTS map used by the existing functions.
          PROJECTS[id] = { images: images };

          // Desktop: project-view panel (full-bleed, click to advance).
          const view = document.createElement('div');
          view.className = 'project-view';
          view.id = id;
          view.addEventListener('click', () => cycleProject(id));
          const img = document.createElement('img');
          img.id = id + '-img';
          img.alt = p.title || '';
          const counter = document.createElement('div');
          counter.className = 'project-counter';
          counter.id = id + '-counter';
          view.appendChild(img);
          view.appendChild(counter);
          if (mainArea) mainArea.appendChild(view);

          // Desktop: menu button.
          if (deskItems) {
            const btn = document.createElement('button');
            btn.textContent = p.title || id;
            btn.addEventListener('click', () => showProject(id, btn));
            deskItems.appendChild(btn);
          }

          // Mobile: menu button.
          if (mobItems) {
            const mbtn = document.createElement('button');
            mbtn.textContent = p.title || id;
            mbtn.addEventListener('click', () => mShowProject(id, mbtn));
            mobItems.appendChild(mbtn);
          }
        });
      }

      function queryUrl(groq) {
        return 'https://' + SANITY.projectId + '.apicdn.sanity.io/' + SANITY.apiVersion +
          '/data/query/' + SANITY.dataset + '?query=' + encodeURIComponent(groq);
      }

      fetch(apiUrl)
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status))))
        .then((data) => render(data && data.result))
        .catch((err) => console.warn('[sanity] project fetch failed, using static fallback:', err));

      // ── Site Settings (featured image, name, tagline, about, contact) ──
      // Each field is applied only when present; otherwise the static
      // placeholder in the markup remains untouched.
      const SETTINGS_QUERY =
        '*[_id=="siteSettings"][0]{name,tagline,email,' +
        '"featuredRef":featuredImage.asset._ref,about}';

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => (
          {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]
        ));
      }

      // Minimal Portable Text → HTML (plain paragraphs).
      function ptToHtml(blocks) {
        return (blocks || [])
          .filter((b) => b && b._type === 'block')
          .map((b) => '<p>' + escapeHtml((b.children || []).map((c) => c.text || '').join('')) + '</p>')
          .join('');
      }

      // Replace a panel's body (the <p> after its <h2>) with new HTML.
      function setPanelBody(id, html) {
        const el = document.getElementById(id);
        if (!el || !html) return;
        el.querySelectorAll('p').forEach((p) => p.remove());
        el.insertAdjacentHTML('beforeend', html);
      }

      function renderSettings(s) {
        if (!s) return;

        // Featured (home) image — desktop + mobile, and the mobile revert target.
        const featSrc = urlFor(s.featuredRef);
        if (featSrc) {
          window.SITE_FEATURED = featSrc;
          const deskImg = document.querySelector('#display-default img');
          if (deskImg) { deskImg.src = featSrc; deskImg.style.display = ''; }
          const mobImg = document.getElementById('mobile-img');
          if (mobImg) mobImg.src = featSrc;
        }

        // Name.
        if (s.name) {
          const dn = document.querySelector('.name-block h1 a');
          if (dn) dn.textContent = s.name;
          const mn = document.querySelector('.mobile-name a');
          if (mn) mn.textContent = s.name;
        }

        // Tagline.
        if (s.tagline) {
          document.querySelectorAll('.name-block p').forEach((p) => (p.textContent = s.tagline));
          const mspan = document.querySelector('.mobile-name span');
          if (mspan) mspan.textContent = s.tagline;
        }

        // About (portable text).
        const aboutHtml = ptToHtml(s.about);
        if (aboutHtml) {
          setPanelBody('panel-about', aboutHtml);
          setPanelBody('m-panel-about', aboutHtml);
        }

        // Contact email.
        if (s.email) {
          const link = '<p><a href="mailto:' + encodeURIComponent(s.email).replace(/%40/g, '@') +
            '">' + escapeHtml(s.email) + '</a></p>';
          setPanelBody('panel-contact', link);
          setPanelBody('m-panel-contact', link);
        }
      }

      fetch(queryUrl(SETTINGS_QUERY))
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status))))
        .then((data) => renderSettings(data && data.result))
        .catch((err) => console.warn('[sanity] settings fetch failed, using static fallback:', err));
    })();
  </script>

</body>
</html>
