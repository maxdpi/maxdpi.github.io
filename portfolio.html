<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logan Sturrock</title>
  <link rel="stylesheet" href="style.css">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray:  #888888;
      --light: #cccccc;
      --bg:    #ffffff;
      --font:  'GT Pressura Mono', 'Courier New', monospace;
      --col-right: 200px;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
    }

    /* ── Desktop layout ───────────────────────────────── */
    .desktop {
      display: grid;
      grid-template-columns: 1fr var(--col-right);
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .main-area {
      grid-column: 1;
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--light);
    }

    .name-block {
      grid-column: 2;
      grid-row: 1;
      border-bottom: 1px solid var(--light);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .name-block h1 {
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    .name-block p {
      color: var(--gray);
      margin-top: 0.25rem;
      font-size: 0.8rem;
    }

    .menu-block {
      grid-column: 2;
      grid-row: 2;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0.75rem;
    }

    /* ── Menu ─────────────────────────────────────────── */
    .menu-toggle {
      background: none;
      border: none;
      font-family: var(--font);
      color: var(--gray);
      cursor: pointer;
      padding: 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
    }

    .menu-toggle:hover { color: var(--black); }

    .menu-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .menu-group.open .arrow { transform: rotate(90deg); }

    .menu-items {
      display: none;
      padding-top: 0.4rem;
      padding-left: 0.5rem;
    }

    .menu-group.open .menu-items { display: block; }

    .menu-items button {
      display: block;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      color: var(--black);
      cursor: pointer;
      padding: 0.2rem 0;
      text-align: left;
      width: 100%;
    }

    .menu-items button:hover { color: var(--gray); }
    .menu-items button.active { text-decoration: underline; }

    /* ── Main area panels ─────────────────────────────── */

    /* All panels sit absolute, full area, hidden by default */
    .display-box,
    .project-view,
    .info-panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .display-box.active,
    .project-view.active,
    .info-panel.active { display: block; }

    /* Featured display */
    .display-box {
      background: #f4f4f4;
    }

    .display-box img,
    .display-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .display-box .placeholder-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--light);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Project view — single full-bleed image, click to advance */
    .project-view {
      background: #f4f4f4;
      cursor: pointer;
    }

    .project-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .project-counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
    }

    /* Info panels */
    .info-panel {
      padding: 3rem;
      display: none;
      flex-direction: column;
      justify-content: center;
    }

    .info-panel.active { display: flex; }

    .info-panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--light);
      padding-bottom: 0.5rem;
    }

    .info-panel p {
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .info-panel a {
      color: var(--black);
      border-bottom: 1px solid var(--light);
      text-decoration: none;
    }

    .info-panel a:hover { border-color: var(--black); }

    /* ── Mobile ───────────────────────────────────────── */
    .mobile { display: none; }

    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      .desktop { display: none; }

      .mobile {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .mobile-content {
        position: relative;
        background: #f4f4f4;
        width: 100%;
        aspect-ratio: 4/3;
        overflow: hidden;
        cursor: pointer;
      }

      .mobile-content img,
      .mobile-content video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .mobile-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--light);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .mobile-info-panel {
        display: none;
        padding: 2rem 1.5rem;
      }

      .mobile-info-panel.active { display: block; }

      .mobile-info-panel h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--gray);
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--light);
        padding-bottom: 0.5rem;
      }

      .mobile-info-panel p { line-height: 1.8; margin-bottom: 1rem; }
      .mobile-info-panel a { color: var(--black); }

      .mobile-nav {
        padding: 1.5rem;
        border-top: 1px solid var(--light);
      }

      .mobile-name {
        font-weight: bold;
        margin-bottom: 1.5rem;
      }

      .mobile-name span {
        display: block;
        color: var(--gray);
        font-weight: normal;
        font-size: 0.9em;
        margin-top: 0.15rem;
      }

      .mobile-menu-group { margin-bottom: 0.75rem; }

      .mobile-menu-toggle {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 11px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .mobile-menu-toggle .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      .mobile-menu-group.open .arrow { transform: rotate(90deg); }

      .mobile-menu-items {
        display: none;
        padding: 0.4rem 0 0 0.5rem;
      }

      .mobile-menu-group.open .mobile-menu-items { display: block; }

      .mobile-menu-items button {
        display: block;
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--black);
        cursor: pointer;
        padding: 0.25rem 0;
        text-align: left;
        width: 100%;
      }

      .mobile-back-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg);
        border-top: 1px solid var(--light);
        padding: 0.75rem 1.5rem;
        z-index: 50;
      }

      .mobile-back-bar.visible { display: flex; }

      .mobile-back-btn {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--gray);
        cursor: pointer;
        padding: 0;
      }
    }

  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════
    PROJECT DATA — edit this section to manage images.
    Each project has an id and an array of image paths.
    Images live in subfolders inside /images/.
    Add or remove paths as needed.
  ════════════════════════════════════════════════ -->
  <script>
    const PROJECTS = {
      'project-k7': {
        images: [
          'images/k7/01.jpg',
          'images/k7/02.jpg',
          'images/k7/03.jpg',
          'images/k7/04.jpg',
          'images/k7/05.jpg'
          // add more: 'images/k7/06.jpg',
        ]
      }
      // add more projects:
      // 'project-posters': {
      //   images: [
      //     'images/posters/01.jpg',
      //     'images/posters/02.jpg',
      //   ]
      // },
    };
  </script>


  <!-- ════════════════════════════════════════
       DESKTOP
  ════════════════════════════════════════ -->
  <div class="desktop">

    <div class="main-area">

      <!-- Featured display — change the img src to update -->
      <div class="display-box active" id="display-default">
        <img src="images/featured.jpg" alt=""
             onerror="this.remove(); document.querySelector('.placeholder-text').style.display='flex'">
        <div class="placeholder-text" style="display:none">[ featured display ]</div>
      </div>

      <!-- Project view — one per project, id must match PROJECTS above -->
      <div class="project-view" id="project-k7" onclick="cycleProject('project-k7')">
        <img id="project-k7-img" src="" alt="">
        <div class="project-counter" id="project-k7-counter"></div>
      </div>

      <!-- Info panels -->
      <div class="info-panel" id="panel-about">
        <h2>About</h2>
        <p>[ A short paragraph about you goes here. Who you are, what you do, what you care about. ]</p>
      </div>

      <div class="info-panel" id="panel-contact">
        <h2>Contact</h2>
        <p><a href="mailto:hello@logansturrock.com">hello@logansturrock.com</a></p>
      </div>

    </div>

    <div class="name-block">
      <h1>Logan Sturrock</h1>
      <p>[ tagline ]</p>
    </div>

    <div class="menu-block">

      <div class="menu-group" id="group-projects">
        <button class="menu-toggle" onclick="toggleGroup('group-projects')">
          <span class="arrow">›</span> Projects
        </button>
        <div class="menu-items">
          <button onclick="showProject('project-k7', this)">K7</button>
          <!-- <button onclick="showProject('project-posters', this)">Posters</button> -->
        </div>
      </div>

      <div class="menu-group" id="group-info">
        <button class="menu-toggle" onclick="toggleGroup('group-info')">
          <span class="arrow">›</span> Info
        </button>
        <div class="menu-items">
          <button onclick="showPanel('panel-about', this)">About</button>
          <button onclick="showPanel('panel-contact', this)">Contact</button>
        </div>
      </div>

    </div>
  </div>


  <!-- ════════════════════════════════════════
       MOBILE
  ════════════════════════════════════════ -->
  <div class="mobile">

    <div class="mobile-content" id="mobile-content" onclick="mobileCycle()">
      <img id="mobile-img" src="images/featured.jpg" alt=""
           onerror="this.style.display='none'">
    </div>

    <div class="mobile-info-panel" id="m-panel-about">
      <h2>About</h2>
      <p>[ A short paragraph about you goes here. ]</p>
    </div>

    <div class="mobile-info-panel" id="m-panel-contact">
      <h2>Contact</h2>
      <p><a href="mailto:hello@logansturrock.com">hello@logansturrock.com</a></p>
    </div>

    <div class="mobile-nav">
      <div class="mobile-name">
        Logan Sturrock
        <span>[ tagline ]</span>
      </div>

      <div class="mobile-menu-group" id="m-group-projects">
        <button class="mobile-menu-toggle" onclick="mToggleGroup('m-group-projects')">
          <span class="arrow">›</span> Projects
        </button>
        <div class="mobile-menu-items">
          <button onclick="mShowProject('project-k7', this)">K7</button>
          <!-- <button onclick="mShowProject('project-posters', this)">Posters</button> -->
        </div>
      </div>

      <div class="mobile-menu-group" id="m-group-info">
        <button class="mobile-menu-toggle" onclick="mToggleGroup('m-group-info')">
          <span class="arrow">›</span> Info
        </button>
        <div class="mobile-menu-items">
          <button onclick="mShowPanel('m-panel-about', this)">About</button>
          <button onclick="mShowPanel('m-panel-contact', this)">Contact</button>
        </div>
      </div>
    </div>

    <div class="mobile-back-bar" id="mobile-back-bar">
      <button class="mobile-back-btn" onclick="mGoBack()">← back</button>
    </div>

  </div>


  <script>

    // ── Project state ──────────────────────────────────
    const projectIdx = {};
    let activeProject = null;
    let activeProjectBtn = null;
    let activePanelBtn = null;
    let mobileActiveProject = null;
    let mobileIsFeatured = true;

    // ── Desktop: cycle images on click ────────────────
    function cycleProject(id) {
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (!images || images.length === 0) return;
      projectIdx[id] = ((projectIdx[id] || 0) + 1) % images.length;
      document.getElementById(id + '-img').src = images[projectIdx[id]];
      document.getElementById(id + '-counter').textContent =
        (projectIdx[id] + 1) + ' / ' + images.length;
    }

    // ── Desktop: show project ──────────────────────────
    function showProject(id, btn) {
      hideAll();
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (images && images.length > 0) {
        projectIdx[id] = 0;
        document.getElementById(id + '-img').src = images[0];
        document.getElementById(id + '-counter').textContent =
          '1 / ' + images.length;
      }
      document.getElementById(id).classList.add('active');
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      activeProjectBtn = btn;
      btn.classList.add('active');
      activeProject = id;
    }

    function showPanel(id, btn) {
      hideAll();
      document.getElementById(id).classList.add('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activePanelBtn = btn;
      btn.classList.add('active');
    }

    function hideAll() {
      document.querySelectorAll('.project-view, .info-panel, .display-box').forEach(el => {
        el.classList.remove('active');
      });
      if (activeProjectBtn) activeProjectBtn.classList.remove('active');
      if (activePanelBtn) activePanelBtn.classList.remove('active');
      activeProject = null;
    }

    // ── Desktop: menu toggles ──────────────────────────
    function toggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    // ── Mobile: cycle images on tap ───────────────────
    function mobileCycle() {
      if (!mobileActiveProject || mobileIsFeatured) return;
      const images = PROJECTS[mobileActiveProject] && PROJECTS[mobileActiveProject].images;
      if (!images || images.length === 0) return;
      projectIdx[mobileActiveProject] = ((projectIdx[mobileActiveProject] || 0) + 1) % images.length;
      document.getElementById('mobile-img').src = images[projectIdx[mobileActiveProject]];
    }

    function mShowProject(id, btn) {
      mHideInfoPanels();
      const images = PROJECTS[id] && PROJECTS[id].images;
      if (images && images.length > 0) {
        projectIdx[id] = 0;
        document.getElementById('mobile-img').src = images[0];
        document.getElementById('mobile-img').style.display = 'block';
      }
      mobileActiveProject = id;
      mobileIsFeatured = false;
      showMobileBack();
    }

    function mShowPanel(id, btn) {
      mHideInfoPanels();
      document.getElementById('mobile-img').src = 'images/featured.jpg';
      document.getElementById(id).classList.add('active');
      mobileIsFeatured = true;
      mobileActiveProject = null;
      showMobileBack();
    }

    function mHideInfoPanels() {
      document.querySelectorAll('.mobile-info-panel').forEach(el => el.classList.remove('active'));
    }

    function mGoBack() {
      mHideInfoPanels();
      document.getElementById('mobile-img').src = 'images/featured.jpg';
      document.getElementById('mobile-img').style.display = 'block';
      mobileIsFeatured = true;
      mobileActiveProject = null;
      hideMobileBack();
    }

    function mToggleGroup(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function showMobileBack() {
      document.getElementById('mobile-back-bar').classList.add('visible');
    }

    function hideMobileBack() {
      document.getElementById('mobile-back-bar').classList.remove('visible');
    }

  </script>

</body>
</html>
